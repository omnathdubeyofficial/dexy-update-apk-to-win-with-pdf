name: android_video_sender
description: Video sender app for Android
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  file_picker: ^8.1.6
  google_fonts: ^6.1.0
  device_info_plus: ^10.0.0
  pdfx: ^2.9.2
  dio: ^5.4.0
  video_thumbnail: ^0.5.3
  network_info_plus: ^5.0.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  visibility_detector: ^0.4.0+2
  web_socket_channel: ^2.4.0
  path_provider: ^2.1.2
  
  mime: ^1.0.5
  shelf: ^1.4.1
  shelf_static: ^1.1.2

  # MUST HAVE
  crypto: ^3.0.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/dex.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/logowithname.png
    - assets/video/
    - assets/background/
    - assets/img/
    - assets/plans/
    - assets/brochure/
